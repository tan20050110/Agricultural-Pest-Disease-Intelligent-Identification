services:
  postgres:
    image: postgres:16-alpine
    container_name: rsod-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: rsod_user
      POSTGRES_PASSWORD: rsod_password
      POSTGRES_DB: rsod_platform
    volumes:
      - ./storage/postgres/data:/var/lib/postgresql/data
      - ./storage/postgres/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rsod_user -d rsod_platform"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: rsod-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: minio_password
    volumes:
      - ./storage/minio/data:/data
      - ./storage/minio/config:/root/.minio
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: rsod-redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: redis_password
    volumes:
      - ./storage/redis/data:/data
    command: redis-server --requirepass redis_password --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  backend:
    build: ./backend
    container_name: rsod-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/models:/app/models
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: rsod_user
      DB_PASSWORD: rsod_password
      DB_DATABASE: rsod_platform
      MINIO_HOST: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: admin
      MINIO_SECRET_KEY: minio_password
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: redis_password
      DEBUG: "false"
      YOLO_MODEL_PATH: models/best.pt
      CONFIDENCE_THRESHOLD: "0.25"
      CORS_ORIGINS: "http://localhost"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: rsod-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
